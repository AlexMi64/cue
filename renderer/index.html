<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:;" />
  <title>cue</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <!-- Top-center floating pill toolbar (drag handle) -->
    <div id="toolbar">
      <button class="tb-logo" id="logo-btn" title="cue"></button>
      <div class="tb-divider"></div>
      <button class="tb-hide" id="hide-btn"><span class="chev"></span><span>Скрыть</span></button>
      <div class="tb-divider"></div>
      <button class="tb-stop" id="stop-btn" title="Начать или остановить прослушивание"></button>
    </div>

    <!-- Main assistant panel -->
    <div id="panel-wrap">
      <span id="live-dot" class="off"></span>
      <div id="panel" class="glass no-drag">
        <div id="messages"></div>

        <div id="action-row">
          <button class="act" data-mode="assist"><span class="ic"></span><span>Помощь</span></button>
          <span class="sep">•</span>
          <button class="act" data-mode="say"><span class="ic"></span><span>Что сказать?</span></button>
          <span class="sep">•</span>
          <button class="act" data-mode="followup"><span class="ic"></span><span>Уточняющие вопросы</span></button>
          <span class="sep">•</span>
          <button class="act" data-mode="recap"><span class="ic"></span><span>Итоги</span></button>
        </div>

        <div id="composer">
          <div id="input-area">
            <div id="placeholder">Спросите о происходящем на экране или в разговоре либо нажмите <span class="keycap">⌘</span><span class="keycap">⏎</span> для помощи</div>
            <textarea id="input" rows="1" spellcheck="false"></textarea>
          </div>
          <div id="composer-bottom">
            <button id="smart-toggle" class="smart-pill"><span class="ic"></span><span>Умный режим</span></button>
            <button id="more-btn" class="more-btn" title="Настройки"></button>
            <div class="spacer"></div>
            <button id="send-btn" title="Отправить"></button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Settings -->
  <div id="settings-scrim" class="hidden">
    <div id="settings" class="glass">
      <div class="s-head">
        <div class="s-title">Настройки</div>
        <button id="s-close" class="s-close">Готово</button>
      </div>
      <div class="s-body">
        <label class="s-label">Провайдер</label>
        <div class="s-seg" id="provider-seg">
          <button data-provider="openai">OpenAI</button>
          <button data-provider="anthropic">Anthropic</button>
          <button data-provider="gemini">Gemini</button>
        </div>

        <label class="s-label">Ключи API <span class="s-hint">хранятся локально в cue-data.json</span></label>
        <div class="s-field"><span>OpenAI</span><input id="key-openai" type="password" placeholder="sk-..." autocomplete="off" /></div>
        <div class="s-field"><span>Anthropic</span><input id="key-anthropic" type="password" placeholder="sk-ant-..." autocomplete="off" /></div>
        <div class="s-field"><span>Gemini</span><input id="key-gemini" type="password" placeholder="AIza..." autocomplete="off" /></div>

        <label class="s-label">Модели <span class="s-hint">быстрая = умный режим выключен · умная = включен</span></label>
        <div class="s-field"><span>Быстрая</span><input id="model-fast" type="text" autocomplete="off" /></div>
        <div class="s-field"><span>Умная</span><input id="model-smart" type="text" autocomplete="off" /></div>

        <div class="s-status" id="s-status"></div>
      </div>
    </div>
  </div>

  <!-- First-run tutorial / walkthrough -->
  <div id="onboard-scrim" class="hidden">
    <div id="onboard" class="glass">
      <div class="ob-dots" id="ob-dots"></div>
      <div class="ob-icon" id="ob-icon"></div>
      <div class="ob-title" id="ob-title"></div>
      <div class="ob-body" id="ob-body"></div>
      <div class="ob-buttons" id="ob-buttons"></div>
      <div class="ob-actions">
        <button id="ob-skip" class="ob-ghost">Пропустить</button>
        <div class="spacer"></div>
        <button id="ob-back" class="ob-ghost">Назад</button>
        <button id="ob-next" class="ob-primary">Далее</button>
      </div>
    </div>
  </div>

  <script src="icons.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
